qwen:
  model: qwen3.7-plus
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  request_timeout_seconds: 120
  max_retries: 2

thinking_profiles:
  answer_single_pass:
    enabled: false
    max_tokens: 384
  logicrag_planner:
    enabled: true
    max_tokens: 1024
  logicrag_rank_summary:
    enabled: true
    max_tokens: 640
  logicrag_final_compose:
    enabled: true
    max_tokens: 1024
  option_judgement:
    enabled: false
    max_tokens: 192
  multi_option_fallback:
    enabled: true
    max_tokens: 512

logicrag:
  enabled: true
  max_subproblems: 6
  max_ranks: 4
  rank_top_k: 12
  memory_chars: 4500

concurrency:
  question_workers: 15
  qwen_workers: 8
  qwen_request_limit: 1000
  bm25_workers: 8

a_board:
  option_matrix_enabled: false
  coverage_gate_enabled: false
  force_doc_coverage_for_a_board: true
  use_doc_ids_as_hint_only: false
  financial_calculator_enabled: false
  max_option_candidates: 12
  max_verifier_candidates_per_option: 6
  low_confidence_threshold: 0.65

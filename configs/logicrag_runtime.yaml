qwen:
  model: qwen3.7-plus
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  request_timeout_seconds: 120
  max_retries: 2

thinking_profiles:
  answer_single_pass:
    level: low
    enabled: false
    max_tokens: 384
  logicrag_planner:
    level: high
    enabled: true
    max_tokens: 1024
  logicrag_query_bundle:
    level: medium
    enabled: true
    max_tokens: 512
  logicrag_sufficiency_gate:
    level: low
    enabled: false
    max_tokens: 192
  logicrag_refinement:
    level: medium
    enabled: true
    max_tokens: 512
  logicrag_rank_summary:
    level: medium
    enabled: true
    max_tokens: 640
  logicrag_final_compose:
    level: high
    enabled: true
    max_tokens: 1024
  option_judgement:
    level: low
    enabled: false
    max_tokens: 192
  multi_option_fallback:
    level: medium
    enabled: true
    max_tokens: 512
  multi_logicrag_option_planner:
    level: low
    enabled: false
    max_tokens: 160
  multi_logicrag_option_verdict:
    level: low
    enabled: false
    max_tokens: 192
  multi_logicrag_option_retry:
    level: low
    enabled: true
    max_tokens: 192
  multi_logicrag_numeric_verifier:
    level: low
    enabled: true
    max_tokens: 320
  claim_set_verification:
    level: medium
    enabled: true
    max_tokens: 768

logicrag:
  enabled: true
  execution_mode: paper_faithful_core
  retrieval_backend: paper_contract_embedding
  dynamic_dag_augmentation: true
  append_unresolved_after_current_rank: true
  sampling_without_replacement: true
  adaptive_retrieval_enabled: false
  llm_query_bundles_enabled: true
  max_query_bundles_per_rank: 4
  max_refinement_rounds_per_rank: 1
  b_board_scope_narrowing_enabled: true
  narrowed_doc_top_n: 5
  max_subproblems: 6
  max_ranks: 4
  rank_top_k: 5
  memory_chars: 4500

concurrency:
  question_workers: 15
  qwen_workers: 8
  qwen_request_limit: 1000
  bm25_workers: 8

a_board:
  option_matrix_enabled: false
  multi_logicrag_enabled: true
  multi_logicrag_retry_enabled: true
  coverage_gate_enabled: false
  force_doc_coverage_for_a_board: true
  use_doc_ids_as_hint_only: false
  financial_calculator_enabled: false
  max_option_candidates: 12
  max_verifier_candidates_per_option: 6
  low_confidence_threshold: 0.65
  claim_centric_multi_enabled: false
  claim_centric_mcq_enabled: false
  max_claim_refinement_rounds: 1
  max_claim_query_bundles: 5
  claim_final_compose_enabled: false
  claim_verdict_max_evidence_items: 6
  claim_retry_verdict_max_evidence_items: 8
  evidence_set_selection_enabled: true
  claim_set_verification_enabled: true
  numeric_fact_ledger_enabled: true
  claim_require_valid_citations: true
  claim_set_verification_max_evidence_items: 10
